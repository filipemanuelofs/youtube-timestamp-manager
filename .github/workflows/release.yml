name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - "youtube-timestamp-manager.user.js"
      - "package.json"
      - "README.md"
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create-release:
    permissions:
      contents: write
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract current version from userscript
        id: current-version
        run: |
          current_version=$(grep -oP '@version\s+\K[0-9]+\.[0-9]+\.[0-9]+' youtube-timestamp-manager.user.js)
          echo "current_version=$current_version" >> $GITHUB_OUTPUT
          echo "Current version: $current_version"

      - name: Calculate new version
        id: new-version
        run: |
          current="${{ steps.current-version.outputs.current_version }}"
          IFS='.' read -r major minor patch <<< "$current"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            bump_type="${{ github.event.inputs.version_type }}"
          else
            commit_msg="${{ github.event.head_commit.message }}"
            if [[ "$commit_msg" =~ ^(feat|feature)(\(.+\))?!: ]] || [[ "$commit_msg" =~ BREAKING.CHANGE ]]; then
              bump_type="major"
            elif [[ "$commit_msg" =~ ^(feat|feature)(\(.+\))?: ]]; then
              bump_type="minor"
            else
              bump_type="patch"
            fi
          fi

          case $bump_type in
            major) new_version="$((major + 1)).0.0" ;;
            minor) new_version="$major.$((minor + 1)).0" ;;
            patch) new_version="$major.$minor.$((patch + 1))" ;;
          esac

          echo "bump_type=$bump_type" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "New version: $new_version (bump: $bump_type)"

      - name: Update version in userscript
        run: |
          new_version="${{ steps.new-version.outputs.new_version }}"
          sed -i "s/@version\s\+[0-9]\+\.[0-9]\+\.[0-9]\+/@version         $new_version/" youtube-timestamp-manager.user.js
          if [ -f "README.md" ]; then
            sed -i "s/version-[0-9]\+\.[0-9]\+\.[0-9]\+-blue/version-$new_version-blue/" README.md
          fi

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate release notes
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$last_tag" ]; then
            commits=$(git log --pretty=format:"- %s" --reverse)
          else
            commits=$(git log ${last_tag}..HEAD --pretty=format:"- %s" --reverse)
          fi

          cat > release_notes.md << EOF
          ## 🚀 What's New in v${{ steps.new-version.outputs.new_version }}

          ### Changes
          $commits

          ### 📦 Installation
          Click here to install/update: [youtube-timestamp-manager.user.js](https://github.com/${{ github.repository }}/releases/download/v${{ steps.new-version.outputs.new_version }}/youtube-timestamp-manager.user.js)

          ### 🔧 Compatibility
          - ✅ YouTube (all versions)
          - ✅ YouTube Live
          - ✅ YouTube Shorts
          - ✅ YouTube Mobile
          - ✅ YouTube Music

          ### 📋 Requirements
          - Modern browser (Chrome, Firefox, Safari, Edge)
          - Userscript manager (Violentmonkey, Tampermonkey, etc.)
          EOF

      - name: Commit version bump
        run: |
          git add youtube-timestamp-manager.user.js README.md
          git commit -m "🔼 Bump version to v${{ steps.new-version.outputs.new_version }}"
          git push origin main

      - name: Create Release
        id: create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_url=$(gh release create "v${{ steps.new-version.outputs.new_version }}" \
            --title "YouTube Timestamp Manager v${{ steps.new-version.outputs.new_version }}" \
            --notes-file release_notes.md \
            ./youtube-timestamp-manager.user.js)
          echo "release_url=$release_url" >> $GITHUB_OUTPUT

      - name: Create success summary
        run: |
          echo "## ✅ Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.new-version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bump Type:** ${{ steps.new-version.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** ${{ steps.create-release.outputs.release_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Direct Install Link" >> $GITHUB_STEP_SUMMARY
          echo "[youtube-timestamp-manager.user.js](https://github.com/${{ github.repository }}/releases/download/v${{ steps.new-version.outputs.new_version }}/youtube-timestamp-manager.user.js)" >> $GITHUB_STEP_SUMMARY
